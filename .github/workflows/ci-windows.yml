name: CI Windows

on:
  pull_request:
    paths:
      - ".gitattributes"
      - ".github/workflows/ci-windows.yml"
      - ".github/workflows/ci_windows/**"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "pyscf/**"
      - "setup.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-wheel:
    runs-on: windows-latest
    timeout-minutes: 300
    defaults:
      run:
        shell: pwsh
    env:
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate CI Windows contract
        run: python .github/workflows/ci_windows/test_ci_windows_contract.py

      - name: Set up MSYS2 UCRT64
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openblas

      - name: Install build dependencies
        run: python -m pip install build wheel setuptools "cmake<4" ninja

      - name: Build and inspect wheel
        run: >-
          ./.github/workflows/ci_windows/build_wheel.ps1
          -RuntimeDllDir "${{ steps.msys2.outputs.msys2-location }}\ucrt64\bin"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          archive: false
          if-no-files-found: error

      - name: Install wheel and run staged pytest
        run: ./.github/workflows/ci_windows/verify_installed_wheel.ps1

      - name: Upload installed-wheel evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-installed-wheel-evidence
          if-no-files-found: error
          include-hidden-files: true
          path: tmp/windows-installed-wheel/**
